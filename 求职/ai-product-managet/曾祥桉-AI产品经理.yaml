        highlights:
          - 参与 AI 产品需求梳理与场景定义，完成需求澄清与优先级划分
          - 输出 PRD、流程图及交互原型，明确功能边界与异常处理逻辑
          - 维护需求与风险清单，推动关键节点按计划推进
          - 建立商业化与投放团队痛点清单，识别 AI 提效机会点
      - company: 万仕道（北京）管理咨询有限公司深圳分公司
        position: 猎头顾问
        date: 2023.10 - 2024.08
        location: 深圳
        highlights:
          - 参与岗位需求拆解与人才画像定义，输出候选人评估报告（Shortlist + Brief）
          - 协同 HR 与业务方推进招聘全流程，积累 B 端多角色沟通经验
          - 作为 AI 招聘助手种子用户，持续反馈产品体验问题并提出优化建议
      - company: 可为易达国际货运代理（深圳）有限公司
        position: 海外客服
        date: 2021.10 - 2022.08
        location: 深圳
        highlights:
          - 面向海外客户承接运输需求，处理提单、报关等业务文件，积累跨语境沟通与复杂流程协同经验
    项目经历:
      - name: CRM 智能客户标签系统（自主 PoC 方案设计，To B）
        summary: |
          项目背景
              　• 实习期间观察到客户信息分散、人工打标签成本高且准确率不稳定的业务痛点，自主发起 PoC 方案设计。
          我的工作
              　• 梳理标签生成核心场景与优先级，定义 In Scope 与 Out of Scope。
              　• 设计完整链路：数据接入 → 清洗 → 标签推理 → 回写 CRM。
              　• 建立标签字典与口径定义，设计"证据展示机制"提升标签可解释性。
              　• 输出 PRD + 流程图 + 交互原型方案。
          项目成果
              　• 将人工标签流程标准化，为后续 AI 标签自动化提供可落地基础方案。

    个人项目:
      - name: 个人 AI 操作系统 | AI 分身工程（Claude Code / v1.5）
        summary: |
          项目背景
              　• 求职与多项目并行中面临信息碎片化、决策反复、跨 session 状态丢失等问题，自主设计并持续迭代一套个人 AI 操作系统，让 AI 成为具备记忆、权限与技能的结构化协作者。
          我的工作
              　• 设计分层 Prompt 架构（Harness Engineering）：主宪法（身份 + 规则）→ 执行协议（权限 + 记忆写回）→ 技能模板（Skills），实现关注点分离与按需加载，降低 token 开销。
              　• 构建 Skills 体系（5 个专项：拆 JD / 项目讲述 / 写 cold message / 面试复盘 / 公司调研），形成求职场景完整闭环。
              　• 设计双层记忆机制（短期任务版 + 长期画像）与 Sensor 自动校验层，解决"每次从零开始"和 AI 越界写回问题。
              　• 设计红黄绿灯权限体系，确保 AI 执行行为可控、不越界。
              　• 从 v1.0 迭代至 v1.5，每版针对实际问题做针对性改进（精简主文件、Skills 按需加载、Sensor + Hook 自动校验、结束协议自动写回）。
          项目成果
              　• 持续日常使用，求职准备、项目打磨、面试模拟均通过该系统完成，验证了"非工程师用 Prompt Engineering 构建可迭代 AI 工作流"的可行性。

      - name: 语音下单助手（出行 AI Copilot，Concept Design）
        summary: |
          项目背景
              　• 为熟悉 AI 产品方法论与对话式交互设计，以出行下单场景为练习对象，完成完整 Concept Design。
          我的工作
              　• 拆解下单全链路，设计语音对话流程（唤起 → 识别 → 补全 → 确认）。
              　• 设计槽位置信度判断、追问补全与多轮对话逻辑。
              　• 构建异常处理机制（超时、识别失败、兜底回退传统流程）。
              　• 输出 PRD、流程图、异常兜底清单及交互原型。

      - name: Coach Titan | AI 饮食教练 MVP（iOS / Web）
        summary: |
          项目背景
              　• 面向"不愿精算食物"的健身人群，基于拳掌法提供低门槛饮食记录与策略建议。
          我的工作
              　• 以零代码背景独立完成端到端交付：产品定义、交互设计、开发部署、iOS 真机验证。
              　• 设计低摩擦录入闭环：快速输入、预览卡片、下一步建议、历史复盘。
              　• 集成多模态模型（图像识别 + 文本生成），处理多模型输出一致性与交互衔接。
              　• 使用 AI Coding 工具完成 MVP 开发，Web 与 iOS 双端可运行。
          项目成果
              　• 完成可演示闭环产品（真实设备运行），验证"低成本记录路径"可行性。

      - name: 飞书 AI 晨报 | 低成本新闻聚合助手（Python / Feishu / RSS）
        summary: |
          项目背景
              　• 针对多源信息获取低效问题，构建轻量化 AI 晨报系统。
          我的工作
              　• 设计多源信息聚合 + 飞书推送流程。
              　• 设计"两级触发"机制（普通版 / AI 版），平衡响应速度与资源消耗。
              　• 在零成本约束下完成 MVP 闭环搭建。
          项目成果
              　• 交付可运行方案，提升信息获取效率。

